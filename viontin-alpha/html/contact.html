<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Contact — Viontin</title>
<link rel="stylesheet" href="/assets/tailwind.css">
</head>
<body class="bg-gray-50 text-gray-800" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
<nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
<div class="max-w-6xl mx-auto px-6 h-16 flex items-center">
<a href="/" class="text-xl font-bold text-white">Viontin<span class="text-violet-400">.</span></a>
<div class="ml-auto flex items-center gap-1">
<a href="/" class="text-gray-400 hover:text-white hover:bg-gray-800 px-3 py-2 rounded text-sm font-medium">Home</a>
<a href="/features" class="text-gray-400 hover:text-white hover:bg-gray-800 px-3 py-2 rounded text-sm font-medium">Features</a>
<a href="/about" class="text-gray-400 hover:text-white hover:bg-gray-800 px-3 py-2 rounded text-sm font-medium">About</a>
<a href="/blog" class="text-gray-400 hover:text-white hover:bg-gray-800 px-3 py-2 rounded text-sm font-medium">Blog</a>
<a href="/contact" style="background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff;padding:.5rem 1.2rem;border-radius:999px;font-weight:600;font-size:.875rem;text-decoration:none">Contact</a>
</div>
</div>
</nav>

<section class="max-w-2xl mx-auto px-6 pt-20 pb-16">
<h1 class="text-4xl font-bold mb-4">Get in Touch</h1>
<p class="text-gray-500 mb-8">Have a question or want to contribute? Send us a message.</p>
<form action="/contact" method="post" class="bg-white border border-gray-200 rounded p-8" style="border-radius:12px">
<div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">Name</label><input type="text" name="name" required class="w-full border border-gray-300 rounded px-3 py-2 text-sm" style="border-radius:8px"></div>
<div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" name="email" required class="w-full border border-gray-300 rounded px-3 py-2 text-sm" style="border-radius:8px"></div>
<div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">Message</label><textarea name="message" rows="5" required class="w-full border border-gray-300 rounded px-3 py-2 text-sm" style="border-radius:8px"></textarea></div>
<button type="submit" class="text-white px-6 py-3 rounded font-semibold border-0" style="background:linear-gradient(135deg,#7c3aed,#3b82f6);border-radius:999px;cursor:pointer">Send Message</button>
</form>
</section>

<footer class="bg-gray-900 border-t border-gray-800 py-8">
<div class="max-w-6xl mx-auto px-6 flex items-center justify-between">
<p class="text-gray-500 text-sm">&copy; 2026 Viontin. Zero to One, Scale-up Easily.</p>
<a href="https://github.com/viontin/framework" class="text-gray-400 text-sm hover:text-violet-400 transition">GitHub</a>
</div>
</footer>
</body>
</html>
